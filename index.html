
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talk Session Scoreboard</title>
<style>
  :root {
    --cream: #FFF8F0;
    --warm-white: #FFFDF9;
    --p1-color: #E85D3A;
    --p1-light: #FFF0EB;
    --p1-glow: rgba(232, 93, 58, 0.25);
    --p2-color: #2D7DD2;
    --p2-light: #EBF4FF;
    --p2-glow: rgba(45, 125, 210, 0.25);
    --text-dark: #1A1A1A;
    --text-muted: #8A8A8A;
    --border: #E8E0D8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow: hidden;
  }

  .header {
    text-align: center;
    margin-bottom: 40px;
  }

  .header h1 {
    font-size: clamp(1.4rem, 3vw, 2rem);
    font-weight: 400;
    color: var(--text-dark);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .header .divider {
    width: 60px;
    height: 2px;
    background: var(--text-dark);
    margin: 12px auto 0;
  }

  .scoreboard {
    display: flex;
    gap: 40px;
    align-items: stretch;
    width: 100%;
    max-width: 900px;
  }

  .vs-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .vs-text {
    font-size: 1.1rem;
    font-weight: 400;
    color: var(--text-muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    writing-mode: vertical-lr;
    transform: rotate(180deg);
  }

  .player-card {
    flex: 1;
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px 28px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    transition: box-shadow 0.3s ease;
    position: relative;
  }

  .player-card.p1:hover { box-shadow: 0 8px 40px var(--p1-glow); }
  .player-card.p2:hover { box-shadow: 0 8px 40px var(--p2-glow); }

  .player-label {
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-family: Georgia, serif;
  }

  .name-input {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(1.2rem, 2.5vw, 1.6rem);
    font-weight: 400;
    text-align: center;
    border: none;
    border-bottom: 1.5px dashed var(--border);
    background: transparent;
    color: var(--text-dark);
    padding: 4px 8px;
    width: 100%;
    max-width: 260px;
    outline: none;
    transition: border-color 0.2s;
  }

  .p1 .name-input:focus { border-bottom-color: var(--p1-color); }
  .p2 .name-input:focus { border-bottom-color: var(--p2-color); }

  .score-display {
    position: relative;
    width: 180px;
    height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .score-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2px solid var(--border);
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  .p1 .score-ring { }
  .p2 .score-ring { }

  .score-number {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(3.5rem, 8vw, 5.5rem);
    font-weight: 400;
    color: var(--text-dark);
    line-height: 1;
    transition: transform 0.15s ease;
    user-select: none;
  }

  .score-number.bump {
    transform: scale(1.15);
  }

  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 8px;
  }

  .score-btn {
    font-family: Georgia, serif;
    font-size: 1.1rem;
    font-weight: 400;
    border: none;
    border-radius: 10px;
    padding: 12px 28px;
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.2s ease;
    letter-spacing: 0.04em;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .score-btn:active {
    transform: scale(0.95) !important;
  }

  .p1 .score-btn.add {
    background: var(--p1-color);
    color: white;
  }
  .p1 .score-btn.add:hover {
    transform: scale(1.04);
    box-shadow: 0 4px 20px var(--p1-glow);
  }

  .p2 .score-btn.add {
    background: var(--p2-color);
    color: white;
  }
  .p2 .score-btn.add:hover {
    transform: scale(1.04);
    box-shadow: 0 4px 20px var(--p2-glow);
  }

  .score-btn.sub {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    padding: 12px 16px;
    font-size: 1rem;
  }
  .score-btn.sub:hover {
    background: #f5f0ea;
    transform: scale(1.04);
  }

  .footer-actions {
    margin-top: 40px;
    display: flex;
    gap: 16px;
  }

  .reset-btn {
    font-family: Georgia, serif;
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 10px 24px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .reset-btn:hover {
    border-color: var(--text-dark);
    color: var(--text-dark);
  }

  .confetti-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    overflow: hidden;
  }

  .confetti-piece {
    position: absolute;
    width: 8px;
    height: 8px;
    opacity: 0;
  }

  .leading-indicator {
    position: absolute;
    top: 10px;
    right: 14px;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 4px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .p1 .leading-indicator {
    background: var(--p1-light);
    color: var(--p1-color);
  }

  .p2 .leading-indicator {
    background: var(--p2-light);
    color: var(--p2-color);
  }

  .leading-indicator.visible {
    opacity: 1;
  }

  @media (max-width: 640px) {
    .scoreboard {
      flex-direction: column;
      gap: 20px;
    }
    .vs-divider {
      padding: 4px 0;
    }
    .vs-text {
      writing-mode: horizontal-tb;
      transform: none;
    }
    .score-display {
      width: 140px;
      height: 140px;
    }
    .player-card {
      padding: 28px 20px 20px;
    }
    .footer-actions {
      margin-top: 28px;
    }
  }

  @media print {
    body { background: white; }
    .btn-row, .footer-actions { display: none; }
    .player-card { break-inside: avoid; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Scoreboard</h1>
  <div class="divider"></div>
</div>

<div class="scoreboard">
  <div class="player-card p1">
    <span class="leading-indicator" id="lead1">Leading</span>
    <span class="player-label">Player One</span>
    <input class="name-input" id="name1" type="text" value="Player 1" maxlength="20"
           onfocus="this.select()">
    <div class="score-display">
      <div class="score-ring"></div>
      <span class="score-number" id="score1">0</span>
    </div>
    <div class="btn-row">
      <button class="score-btn sub" onclick="changeScore(1, -1)" aria-label="Subtract one point">−1</button>
      <button class="score-btn add" onclick="changeScore(1, 1)" aria-label="Add one point">+1 Correct</button>
    </div>
  </div>

  <div class="vs-divider">
    <span class="vs-text">vs</span>
  </div>

  <div class="player-card p2">
    <span class="leading-indicator" id="lead2">Leading</span>
    <span class="player-label">Player Two</span>
    <input class="name-input" id="name2" type="text" value="Player 2" maxlength="20"
           onfocus="this.select()">
    <div class="score-display">
      <div class="score-ring"></div>
      <span class="score-number" id="score2">0</span>
    </div>
    <div class="btn-row">
      <button class="score-btn sub" onclick="changeScore(2, -1)" aria-label="Subtract one point">−1</button>
      <button class="score-btn add" onclick="changeScore(2, 1)" aria-label="Add one point">+1 Correct</button>
    </div>
  </div>
</div>

<div class="footer-actions">
  <button class="reset-btn" onclick="resetScores()">Reset Scores</button>
  <button class="reset-btn" onclick="resetAll()">New Game</button>
</div>

<div class="confetti-container" id="confetti"></div>

<script>
  let scores = { 1: 0, 2: 0 };

  function changeScore(player, delta) {
    scores[player] = Math.max(0, scores[player] + delta);
    const el = document.getElementById('score' + player);
    el.textContent = scores[player];

    if (delta > 0) {
      el.classList.add('bump');
      setTimeout(() => el.classList.remove('bump'), 160);
      burstConfetti(player);
    }

    updateLeading();
  }

  function updateLeading() {
    const lead1 = document.getElementById('lead1');
    const lead2 = document.getElementById('lead2');

    lead1.classList.remove('visible');
    lead2.classList.remove('visible');

    if (scores[1] > scores[2] && scores[1] > 0) {
      lead1.classList.add('visible');
    } else if (scores[2] > scores[1] && scores[2] > 0) {
      lead2.classList.add('visible');
    }
  }

  function resetScores() {
    scores = { 1: 0, 2: 0 };
    document.getElementById('score1').textContent = '0';
    document.getElementById('score2').textContent = '0';
    updateLeading();
  }

  function resetAll() {
    resetScores();
    document.getElementById('name1').value = 'Player 1';
    document.getElementById('name2').value = 'Player 2';
  }

  function burstConfetti(player) {
    const container = document.getElementById('confetti');
    const colors = player === 1
      ? ['#E85D3A', '#F4A261', '#FFD6CC', '#C1440E']
      : ['#2D7DD2', '#6DB3F2', '#C8E1FF', '#1B5FA0'];

    const card = document.querySelector('.p' + player);
    const rect = card.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height * 0.45;

    for (let i = 0; i < 12; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      const color = colors[Math.floor(Math.random() * colors.length)];
      const size = 5 + Math.random() * 6;
      const angle = (Math.random() * Math.PI * 2);
      const dist = 40 + Math.random() * 80;
      const dx = Math.cos(angle) * dist;
      const dy = Math.sin(angle) * dist - 30;
      const rot = Math.random() * 360;
      const shape = Math.random() > 0.5 ? '50%' : '2px';

      piece.style.cssText = `
        left: ${cx}px; top: ${cy}px;
        width: ${size}px; height: ${size}px;
        background: ${color};
        border-radius: ${shape};
        transform: translate(-50%, -50%);
      `;

      container.appendChild(piece);

      requestAnimationFrame(() => {
        piece.style.transition = 'all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
        piece.style.opacity = '1';
        piece.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) rotate(${rot}deg)`;

        setTimeout(() => {
          piece.style.transition = 'opacity 0.3s ease';
          piece.style.opacity = '0';
          setTimeout(() => piece.remove(), 300);
        }, 350);
      });
    }
  }
</script>
</body>
</html>
