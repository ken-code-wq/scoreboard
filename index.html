
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talk Session Scoreboard</title>
<style>
  :root {
    --cream: #FFF8F0;
    --warm-white: #FFFDF9;
    --p1-color: #E85D3A;
    --p1-light: #FFF0EB;
    --p1-glow: rgba(232, 93, 58, 0.25);
    --p2-color: #2D7DD2;
    --p2-light: #EBF4FF;
    --p2-glow: rgba(45, 125, 210, 0.25);
    --text-dark: #1A1A1A;
    --text-muted: #8A8A8A;
    --border: #E8E0D8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow: hidden;
  }

  .header {
    text-align: center;
    margin-bottom: 40px;
  }

  .header h1 {
    font-size: clamp(1.4rem, 3vw, 2rem);
    font-weight: 400;
    color: var(--text-dark);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .header .divider {
    width: 60px;
    height: 2px;
    background: var(--text-dark);
    margin: 12px auto 0;
  }

  .scoreboard {
    display: flex;
    gap: 40px;
    align-items: stretch;
    width: 100%;
    max-width: 900px;
  }

  .vs-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .vs-text {
    font-size: 1.1rem;
    font-weight: 400;
    color: var(--text-muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    writing-mode: vertical-lr;
    transform: rotate(180deg);
  }

  .player-card {
    flex: 1;
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px 28px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    transition: box-shadow 0.3s ease;
    position: relative;
  }

  .player-card.p1:hover { box-shadow: 0 8px 40px var(--p1-glow); }
  .player-card.p2:hover { box-shadow: 0 8px 40px var(--p2-glow); }

  .player-label {
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-family: Georgia, serif;
  }

  .name-input {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(1.2rem, 2.5vw, 1.6rem);
    font-weight: 400;
    text-align: center;
    border: none;
    border-bottom: 1.5px dashed var(--border);
    background: transparent;
    color: var(--text-dark);
    padding: 4px 8px;
    width: 100%;
    max-width: 260px;
    outline: none;
    transition: border-color 0.2s;
  }

  .p1 .name-input:focus { border-bottom-color: var(--p1-color); }
  .p2 .name-input:focus { border-bottom-color: var(--p2-color); }

  .score-display {
    position: relative;
    width: 180px;
    height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .score-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2px solid var(--border);
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  .p1 .score-ring { }
  .p2 .score-ring { }

  .score-number {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(3.5rem, 8vw, 5.5rem);
    font-weight: 400;
    color: var(--text-dark);
    line-height: 1;
    transition: transform 0.15s ease;
    user-select: none;
  }

  .score-number.bump {
    transform: scale(1.15);
  }

  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 8px;
  }

  .score-btn {
    font-family: Georgia, serif;
    font-size: 1.1rem;
    font-weight: 400;
    border: none;
    border-radius: 10px;
    padding: 12px 28px;
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.2s ease;
    letter-spacing: 0.04em;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .score-btn:active {
    transform: scale(0.95) !important;
  }

  .p1 .score-btn.add {
    background: var(--p1-color);
    color: white;
  }
  .p1 .score-btn.add:hover {
    transform: scale(1.04);
    box-shadow: 0 4px 20px var(--p1-glow);
  }

  .p2 .score-btn.add {
    background: var(--p2-color);
    color: white;
  }
  .p2 .score-btn.add:hover {
    transform: scale(1.04);
    box-shadow: 0 4px 20px var(--p2-glow);
  }

  .score-btn.sub {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    padding: 12px 16px;
    font-size: 1rem;
  }
  .score-btn.sub:hover {
    background: #f5f0ea;
    transform: scale(1.04);
  }

  .footer-actions {
    margin-top: 40px;
    display: flex;
    gap: 16px;
  }

  .end-quiz-btn {
    font-family: Georgia, serif;
    font-size: 0.8rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    background: var(--text-dark);
    border: 1px solid var(--text-dark);
    color: white;
    padding: 10px 24px;
    border-radius: 8px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
  }

  .end-quiz-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 10px 24px rgba(26, 26, 26, 0.12);
  }

  .quiz-ended .score-btn,
  .quiz-ended .name-input,
  .quiz-ended .footer-actions .reset-btn,
  .quiz-ended .footer-actions .end-quiz-btn {
    pointer-events: none;
    opacity: 0.55;
  }

  .result-overlay {
    position: fixed;
    inset: 0;
    display: grid;
    place-items: center;
    background: rgba(255, 248, 240, 0.72);
    backdrop-filter: blur(10px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.28s ease;
    z-index: 200;
    padding: 24px;
  }

  .result-overlay.visible {
    opacity: 1;
    pointer-events: auto;
  }

  .result-card {
    width: min(100%, 420px);
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 30px 26px 24px;
    text-align: center;
    box-shadow: 0 24px 80px rgba(26, 26, 26, 0.16);
    transform: translateY(14px) scale(0.96);
    transition: transform 0.32s cubic-bezier(0.2, 1, 0.2, 1);
  }

  .result-overlay.visible .result-card {
    transform: translateY(0) scale(1);
  }

  .result-badge {
    display: inline-block;
    font-size: 0.65rem;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    padding: 6px 10px;
    border-radius: 999px;
    margin-bottom: 16px;
  }

  .result-title {
    font-size: clamp(1.8rem, 4vw, 2.4rem);
    font-weight: 400;
    line-height: 1.1;
    margin-bottom: 10px;
    color: var(--text-dark);
  }

  .result-subtitle {
    font-size: 1rem;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .winner-card {
    margin-top: 18px;
    padding: 18px;
    border-radius: 18px;
    border: 1px solid var(--border);
    animation: winnerPulse 1.2s ease-in-out infinite;
  }

  .winner-card.p1 {
    background: linear-gradient(180deg, var(--p1-light), #fff);
    border-color: rgba(232, 93, 58, 0.22);
  }

  .winner-card.p2 {
    background: linear-gradient(180deg, var(--p2-light), #fff);
    border-color: rgba(45, 125, 210, 0.22);
  }

  .winner-name {
    display: block;
    font-size: clamp(1.4rem, 3vw, 1.8rem);
    color: var(--text-dark);
    margin-bottom: 6px;
  }

  .winner-score {
    font-size: 0.85rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .winner-tie {
    margin-top: 18px;
    padding: 18px;
    border-radius: 18px;
    border: 1px dashed var(--border);
    animation: winnerPulse 1.2s ease-in-out infinite;
  }

  .result-actions {
    margin-top: 20px;
  }

  @keyframes winnerPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.03); }
  }

  @keyframes confettiPop {
    0% { transform: translateY(0) scale(0.7); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: translateY(160px) rotate(240deg) scale(1); opacity: 0; }
  }

  .reset-btn {
    font-family: Georgia, serif;
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 10px 24px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .reset-btn:hover {
    border-color: var(--text-dark);
    color: var(--text-dark);
  }

  .confetti-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    overflow: hidden;
  }

  .confetti-piece {
    position: absolute;
    width: 8px;
    height: 8px;
    opacity: 0;
  }

  .leading-indicator {
    position: absolute;
    top: 10px;
    right: 14px;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 4px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .p1 .leading-indicator {
    background: var(--p1-light);
    color: var(--p1-color);
  }

  .p2 .leading-indicator {
    background: var(--p2-light);
    color: var(--p2-color);
  }

  .leading-indicator.visible {
    opacity: 1;
  }

  @media (max-width: 640px) {
    .scoreboard {
      flex-direction: column;
      gap: 20px;
    }
    .vs-divider {
      padding: 4px 0;
    }
    .vs-text {
      writing-mode: horizontal-tb;
      transform: none;
    }
    .score-display {
      width: 140px;
      height: 140px;
    }
    .player-card {
      padding: 28px 20px 20px;
    }
    .footer-actions {
      margin-top: 28px;
    }
  }

  @media print {
    body { background: white; }
    .btn-row, .footer-actions { display: none; }
    .player-card { break-inside: avoid; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Scoreboard</h1>
  <div class="divider"></div>
</div>

<div class="scoreboard">
  <div class="player-card p1">
    <span class="leading-indicator" id="lead1">Leading</span>
    <span class="player-label">Player One</span>
    <input class="name-input" id="name1" type="text" value="Player 1" maxlength="20"
           onfocus="this.select()">
    <div class="score-display">
      <div class="score-ring"></div>
      <span class="score-number" id="score1">0</span>
    </div>
    <div class="btn-row">
      <button class="score-btn sub" onclick="changeScore(1, -1)" aria-label="Subtract one point">−1</button>
      <button class="score-btn add" onclick="changeScore(1, 1)" aria-label="Add one point">+1 Correct</button>
    </div>
  </div>

  <div class="vs-divider">
    <span class="vs-text">vs</span>
  </div>

  <div class="player-card p2">
    <span class="leading-indicator" id="lead2">Leading</span>
    <span class="player-label">Player Two</span>
    <input class="name-input" id="name2" type="text" value="Player 2" maxlength="20"
           onfocus="this.select()">
    <div class="score-display">
      <div class="score-ring"></div>
      <span class="score-number" id="score2">0</span>
    </div>
    <div class="btn-row">
      <button class="score-btn sub" onclick="changeScore(2, -1)" aria-label="Subtract one point">−1</button>
      <button class="score-btn add" onclick="changeScore(2, 1)" aria-label="Add one point">+1 Correct</button>
    </div>
  </div>
</div>

<div class="footer-actions">
  <button class="reset-btn" onclick="resetScores()">Reset Scores</button>
    <button class="end-quiz-btn" onclick="endQuiz()">End Quiz</button>
  <button class="reset-btn" onclick="resetAll()">New Game</button>
</div>

<div class="confetti-container" id="confetti"></div>

  <div class="result-overlay" id="resultOverlay" aria-hidden="true">
    <div class="result-card" id="resultCard" role="dialog" aria-modal="true" aria-labelledby="resultTitle">
      <div class="result-badge" id="resultBadge">Quiz Complete</div>
      <div class="result-title" id="resultTitle">We have a winner</div>
      <div class="result-subtitle" id="resultSubtitle">The final scores are in.</div>
      <div class="winner-card" id="winnerCard">
        <span class="winner-name" id="winnerName">Player</span>
        <div class="winner-score" id="winnerScore">0 points</div>
      </div>
      <div class="result-actions">
        <button class="reset-btn" onclick="resetAll()">Play Again</button>
      </div>
    </div>
  </div>

<script>
  let scores = { 1: 0, 2: 0 };
  let quizEnded = false;

  function changeScore(player, delta) {
    if (quizEnded) return;
    scores[player] = Math.max(0, scores[player] + delta);
    const el = document.getElementById('score' + player);
    el.textContent = scores[player];

    if (delta > 0) {
      el.classList.add('bump');
      setTimeout(() => el.classList.remove('bump'), 160);
      burstConfetti(player);
    }

    updateLeading();
  }

  function updateLeading() {
    const lead1 = document.getElementById('lead1');
    const lead2 = document.getElementById('lead2');

    lead1.classList.remove('visible');
    lead2.classList.remove('visible');

    if (scores[1] > scores[2] && scores[1] > 0) {
      lead1.classList.add('visible');
    } else if (scores[2] > scores[1] && scores[2] > 0) {
      lead2.classList.add('visible');
    }
  }

  function resetScores() {
    quizEnded = false;
    document.body.classList.remove('quiz-ended');
    hideResults();
    scores = { 1: 0, 2: 0 };
    document.getElementById('score1').textContent = '0';
    document.getElementById('score2').textContent = '0';
    updateLeading();
  }

  function resetAll() {
    resetScores();
    document.getElementById('name1').value = 'Player 1';
    document.getElementById('name2').value = 'Player 2';
  }

  function endQuiz() {
    if (quizEnded) return;

    quizEnded = true;
    document.body.classList.add('quiz-ended');

    const name1 = document.getElementById('name1').value.trim() || 'Player 1';
    const name2 = document.getElementById('name2').value.trim() || 'Player 2';
    const resultOverlay = document.getElementById('resultOverlay');
    const resultBadge = document.getElementById('resultBadge');
    const resultTitle = document.getElementById('resultTitle');
    const resultSubtitle = document.getElementById('resultSubtitle');
    const winnerCard = document.getElementById('winnerCard');
    const winnerName = document.getElementById('winnerName');
    const winnerScore = document.getElementById('winnerScore');

    if (scores[1] === scores[2]) {
      resultBadge.textContent = 'Quiz Complete';
      resultTitle.textContent = 'It is a tie';
      resultSubtitle.textContent = 'Both players finished on the same score.';
      winnerCard.className = 'winner-card winner-tie';
      winnerName.textContent = `${name1} and ${name2}`;
      winnerScore.textContent = `${scores[1]} points each`;
    } else {
      const player = scores[1] > scores[2] ? 1 : 2;
      const winnerNameText = player === 1 ? name1 : name2;
      const winnerScoreValue = scores[player];
      resultBadge.textContent = 'Winner Declared';
      resultTitle.textContent = `${winnerNameText} wins`;
      resultSubtitle.textContent = 'Final score locked and celebration unlocked.';
      winnerCard.className = `winner-card p${player}`;
      winnerName.textContent = winnerNameText;
      winnerScore.textContent = `${winnerScoreValue} points`;
      burstConfetti(player, true);
    }

    resultOverlay.classList.add('visible');
    resultOverlay.setAttribute('aria-hidden', 'false');
  }

  function hideResults() {
    const resultOverlay = document.getElementById('resultOverlay');
    resultOverlay.classList.remove('visible');
    resultOverlay.setAttribute('aria-hidden', 'true');
  }

  function burstConfetti(player, endQuizBurst = false) {
    const container = document.getElementById('confetti');
    const colors = player === 1
      ? ['#E85D3A', '#F4A261', '#FFD6CC', '#C1440E']
      : ['#2D7DD2', '#6DB3F2', '#C8E1FF', '#1B5FA0'];

    const card = document.querySelector('.p' + player);
    const rect = card.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height * 0.45;

    for (let i = 0; i < 12; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      const color = colors[Math.floor(Math.random() * colors.length)];
      const size = 5 + Math.random() * 6;
      const angle = (Math.random() * Math.PI * 2);
      const dist = 40 + Math.random() * 80;
      const dx = Math.cos(angle) * dist;
      const dy = Math.sin(angle) * dist - (endQuizBurst ? 120 : 30);
      const rot = Math.random() * 360;
      const shape = Math.random() > 0.5 ? '50%' : '2px';

      piece.style.cssText = `
        left: ${cx}px; top: ${cy}px;
        width: ${size}px; height: ${size}px;
        background: ${color};
        border-radius: ${shape};
        transform: translate(-50%, -50%);
        animation: ${endQuizBurst ? 'confettiPop 0.9s ease-out forwards' : 'none'};
      `;

      container.appendChild(piece);

      requestAnimationFrame(() => {
        piece.style.transition = 'all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
        piece.style.opacity = '1';
        piece.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) rotate(${rot}deg)`;

        setTimeout(() => {
          piece.style.transition = 'opacity 0.3s ease';
          piece.style.opacity = '0';
          setTimeout(() => piece.remove(), 300);
        }, 350);
      });
    }
  }
</script>
</body>
</html>
